<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide Feedback - __DECK_NAME__</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif; background: #f5f5f5; color: #333; overflow: hidden; height: 100vh; }

  /* ===== Header ===== */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: 48px; background: #1B4565; color: #fff; flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-title { font-size: 15px; font-weight: 600; white-space: nowrap; }
  .deck-badge {
    background: #3E9BA4; color: #fff; padding: 4px 14px; border-radius: 4px;
    font-size: 13px; border: none; cursor: default;
  }
  .header-center { display: flex; align-items: center; gap: 8px; }
  .nav-btn {
    background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff;
    width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.15); }
  .slide-num { font-size: 14px; min-width: 60px; text-align: center; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .header-action {
    background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff;
    padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
    white-space: nowrap;
  }
  .header-action:hover { background: rgba(255,255,255,0.15); }
  .header-action.active { background: #3E9BA4; border-color: #3E9BA4; }

  /* ===== Main layout ===== */
  .main { display: flex; height: calc(100vh - 48px); }

  /* ===== Slide preview (left) ===== */
  .preview-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #e8e8e8; padding: 24px; min-width: 0;
  }
  .preview-wrapper {
    width: 100%; max-width: 1200px; aspect-ratio: 16/9;
    background: #fff; box-shadow: 0 2px 16px rgba(0,0,0,0.12); border-radius: 4px;
    overflow: hidden;
  }
  .preview-wrapper iframe { width: 100%; height: 100%; border: none; }

  /* ===== Sidebar (right) ===== */
  .sidebar {
    width: 360px; flex-shrink: 0; background: #fff; border-left: 1px solid #ddd;
    display: flex; flex-direction: column; transition: margin-right 0.2s;
  }
  .sidebar.hidden { margin-right: -360px; }
  .sidebar-header {
    padding: 16px 16px 12px; border-bottom: 1px solid #eee;
  }
  .sidebar-title { font-size: 15px; font-weight: 700; color: #c0392b; margin-bottom: 6px; }
  .slide-info { font-size: 12px; color: #888; }

  /* Comment input area */
  .comment-input-area {
    padding: 12px 16px; border-bottom: 1px solid #eee; flex-shrink: 0;
  }
  .comment-input-area label {
    font-size: 12px; color: #888; display: block; margin-bottom: 6px;
  }
  .comment-input-area textarea {
    width: 100%; height: 72px; border: 1px solid #ddd; border-radius: 6px;
    padding: 8px 10px; font-size: 13px; font-family: inherit; resize: none;
  }
  .comment-input-area textarea:focus { outline: none; border-color: #3E9BA4; }
  .comment-input-area textarea::placeholder { color: #bbb; }

  /* Quick actions */
  .quick-actions {
    display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px; margin-top: 10px;
  }
  .action-btn {
    background: #fff; border: 1px solid #ddd; padding: 5px 10px; border-radius: 4px;
    cursor: pointer; font-size: 12px; color: #555; transition: all 0.15s;
  }
  .action-btn:hover { background: #f0f0f0; border-color: #bbb; }
  .action-btn.accent-teal { background: #e8f5f6; border-color: #3E9BA4; color: #2c7a82; }
  .action-btn.accent-teal:hover { background: #d0eef0; }
  .action-btn.accent-warm { background: #fef3e8; border-color: #e67e22; color: #b35f17; }
  .action-btn.accent-warm:hover { background: #fde8d0; }

  /* Add button */
  .add-btn {
    display: block; width: calc(100% - 32px); margin: 12px 16px;
    background: #3E9BA4; color: #fff; border: none; padding: 10px;
    border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .add-btn:hover { background: #358a92; }
  .add-btn:disabled { background: #ccc; cursor: default; }

  /* Comment list */
  .comment-list-area {
    flex: 1; overflow-y: auto; padding: 0 16px 12px; min-height: 0;
  }
  .comment-list-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0 8px; position: sticky; top: 0; background: #fff;
  }
  .comment-list-header span { font-size: 13px; font-weight: 600; color: #666; }
  .comment-count {
    background: #3E9BA4; color: #fff; font-size: 11px; font-weight: 700;
    width: 20px; height: 20px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
  }
  .comment-item {
    border: 1px solid #d0e8eb; border-left: 3px solid #3E9BA4; border-radius: 6px;
    padding: 10px 12px; margin-bottom: 8px; position: relative; cursor: pointer;
    transition: background 0.1s;
  }
  .comment-item:hover { background: #f8fcfc; }
  .comment-item.active { background: #eef7f8; border-color: #3E9BA4; }
  .comment-item-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 4px;
  }
  .comment-slide-label { font-size: 12px; font-weight: 700; color: #1B4565; }
  .comment-slide-title { font-size: 11px; color: #999; margin-left: 8px; }
  .comment-delete {
    background: none; border: none; color: #bbb; cursor: pointer; font-size: 14px;
    padding: 0 2px; line-height: 1;
  }
  .comment-delete:hover { color: #e74c3c; }
  .comment-text { font-size: 12px; color: #555; line-height: 1.5; white-space: pre-wrap; }

  /* ===== Footer ===== */
  .footer {
    display: flex; align-items: center; justify-content: flex-end; gap: 8px;
    padding: 8px 16px; border-top: 1px solid #ddd; background: #fafafa; flex-shrink: 0;
  }
  .footer-btn {
    background: #fff; border: 1px solid #ddd; padding: 6px 14px; border-radius: 4px;
    cursor: pointer; font-size: 12px; color: #555;
  }
  .footer-btn:hover { background: #f0f0f0; }
  .footer-btn.danger { color: #e74c3c; border-color: #f5c6cb; }
  .footer-btn.danger:hover { background: #fdecea; }

  /* ===== Layout modal ===== */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; max-width: 680px; width: 90%;
    max-height: 80vh; overflow-y: auto; padding: 24px;
  }
  .modal h2 { font-size: 17px; margin-bottom: 16px; color: #1B4565; }
  .modal h3 {
    font-size: 12px; font-weight: 600; color: #999; margin: 14px 0 6px;
    letter-spacing: 0.3px;
  }
  .modal h3:first-of-type { margin-top: 0; }
  .pattern-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .pattern-btn {
    background: #f5f5f5; border: 1px solid #ddd; padding: 5px 10px;
    border-radius: 4px; cursor: pointer; font-size: 11px; color: #444;
  }
  .pattern-btn:hover { background: #1B4565; color: #fff; border-color: #1B4565; }
  .modal-close {
    float: right; background: none; border: none; font-size: 22px;
    cursor: pointer; color: #999; line-height: 1;
  }
  .modal-close:hover { color: #333; }

  /* ===== Toast ===== */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1B4565; color: #fff; padding: 10px 24px; border-radius: 8px;
    font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="header-title">Slide Feedback</span>
    <span class="deck-badge">__DECK_NAME__</span>
  </div>
  <div class="header-center">
    <button class="nav-btn" onclick="prevSlide()" title="Previous (←)">&larr;</button>
    <span class="slide-num" id="slideCounter">1 / ?</span>
    <button class="nav-btn" onclick="nextSlide()" title="Next (→)">&rarr;</button>
  </div>
  <div class="header-right">
    <button class="header-action" onclick="openInNewTab()">新しいタブで開く</button>
    <button class="header-action" onclick="toggleFullscreen()">フルスクリーン</button>
    <button class="header-action active" id="commentToggle" onclick="toggleSidebar()">コメント</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Slide preview -->
  <div class="preview-area">
    <div class="preview-wrapper">
      <iframe id="slideFrame" src="__DECK_PATH__"></iframe>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">修正指示</div>
      <div class="slide-info" id="slideInfo">スライド 1</div>
    </div>

    <div class="comment-input-area">
      <label>このスライドのコメント</label>
      <textarea id="commentBox" placeholder="新しいコメントを追加..."></textarea>
      <div class="quick-actions">
        <button class="action-btn" onclick="insertAction('/slide-style-rector をつかってスタイルを整えて')">スタイル整形</button>
        <button class="action-btn" onclick="insertAction('/layout-fix をつかってレイアウト崩れを修正して')">レイアウト修正</button>
        <button class="action-btn" onclick="openLayoutModal()">レイアウト例指定</button>
        <button class="action-btn accent-warm" onclick="insertAction('/ergon をつかって説明イラストを作成して挿入して')">説明イラスト作成</button>
        <button class="action-btn accent-teal" onclick="insertAction('/ergon をつかって背景画像を作成して挿入して')">背景画像作成</button>
        <button class="action-btn accent-teal" onclick="insertAction('/svg-creator をつかって図解を作成して挿入して')">図解作成</button>
      </div>
      <button class="add-btn" id="addBtn" onclick="addComment()">追加</button>
    </div>

    <div class="comment-list-area">
      <div class="comment-list-header">
        <span>コメント一覧</span>
        <div class="comment-count" id="commentCount">0</div>
      </div>
      <div id="commentList"></div>
    </div>

    <div class="footer">
      <button class="footer-btn" onclick="copyJSON()">JSON コピー</button>
      <button class="footer-btn danger" onclick="deleteAll()">全削除</button>
      <button class="footer-btn" onclick="toggleSidebar()">&times; 閉じる</button>
    </div>
  </div>
</div>

<!-- Layout selection modal -->
<div class="modal-overlay" id="layoutModal">
  <div class="modal">
    <button class="modal-close" onclick="closeLayoutModal()">&times;</button>
    <h2>レイアウトパターン選択</h2>
    <div id="patternList"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const DECK_NAME = '__DECK_NAME__';
const DECK_PATH = '__DECK_PATH__';
const PATTERNS = __PATTERNS_DATA__;
const STORAGE_KEY = 'slide-review-' + DECK_NAME;

let currentSlide = 0;
let totalSlides = 0;
let slideTitles = [];
let commentsList = []; // [{slide, title, text}]

// ===== Init =====
function init() {
  loadComments();
  initSlides();
}

function loadComments() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) commentsList = JSON.parse(saved);
  } catch(e) { commentsList = []; }
}

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(commentsList));
}

// ===== Slides =====
function initSlides() {
  var iframe = document.getElementById('slideFrame');
  iframe.onload = function() {
    try {
      var doc = iframe.contentDocument || iframe.contentWindow.document;
      var slides = doc.querySelectorAll('svg[data-marpit-svg]');
      totalSlides = slides.length;
      if (totalSlides === 0) {
        var sections = doc.querySelectorAll('section[id]');
        totalSlides = sections.length;
      }
      extractTitles(doc);
      goToSlide(0);
    } catch(e) {
      console.error('Cannot access iframe:', e);
    }
  };
}

function extractTitles(doc) {
  slideTitles = [];
  var sections = doc.querySelectorAll('section[id]');
  for (var i = 0; i < sections.length; i++) {
    var h = sections[i].querySelector('h1, h2');
    slideTitles.push(h ? h.textContent.trim() : '');
  }
}

function goToSlide(n) {
  if (n < 0 || n >= totalSlides) return;
  currentSlide = n;
  updateCounter();
  updateSlideInfo();
  renderCommentList();

  var iframe = document.getElementById('slideFrame');
  try {
    var doc = iframe.contentDocument || iframe.contentWindow.document;
    var slides = doc.querySelectorAll('svg[data-marpit-svg]');
    if (slides.length > 0 && slides[n]) {
      slides[n].scrollIntoView({ behavior: 'auto' });
    }
  } catch(e) {}
}

function nextSlide() { goToSlide(currentSlide + 1); }
function prevSlide() { goToSlide(currentSlide - 1); }

function updateCounter() {
  document.getElementById('slideCounter').textContent = (currentSlide + 1) + ' / ' + totalSlides;
}

function updateSlideInfo() {
  var title = slideTitles[currentSlide] || '';
  var text = 'スライド ' + (currentSlide + 1);
  if (title) text += ': ' + title;
  document.getElementById('slideInfo').textContent = text;
}

// ===== Comments =====
function addComment() {
  var box = document.getElementById('commentBox');
  var text = box.value.trim();
  if (!text) return;

  commentsList.push({
    slide: currentSlide + 1,
    title: slideTitles[currentSlide] || '',
    text: text
  });
  saveToStorage();
  box.value = '';
  renderCommentList();
  showToast('コメントを追加しました');
}

function deleteComment(idx) {
  commentsList.splice(idx, 1);
  saveToStorage();
  renderCommentList();
}

function deleteAll() {
  if (commentsList.length === 0) return;
  if (!confirm('全てのコメントを削除しますか？')) return;
  commentsList = [];
  saveToStorage();
  renderCommentList();
  showToast('全コメントを削除しました');
}

function insertAction(text) {
  var box = document.getElementById('commentBox');
  if (box.value && !box.value.endsWith('\n')) box.value += '\n';
  box.value += text;
  box.focus();
}

function renderCommentList() {
  var container = document.getElementById('commentList');
  container.innerHTML = '';
  document.getElementById('commentCount').textContent = commentsList.length;

  for (var i = 0; i < commentsList.length; i++) {
    var c = commentsList[i];
    var div = document.createElement('div');
    div.className = 'comment-item' + (c.slide === currentSlide + 1 ? ' active' : '');
    var titleShort = c.title ? c.title.substring(0, 16) + (c.title.length > 16 ? '...' : '') : '';
    div.innerHTML =
      '<div class="comment-item-header">' +
        '<div><span class="comment-slide-label">スライド ' + c.slide + '</span>' +
        '<span class="comment-slide-title">' + escapeHtml(titleShort) + '</span></div>' +
        '<button class="comment-delete" data-idx="' + i + '" title="削除">&times;</button>' +
      '</div>' +
      '<div class="comment-text">' + escapeHtml(c.text) + '</div>';

    // Click to navigate
    (function(slideNum) {
      div.addEventListener('click', function(e) {
        if (e.target.classList.contains('comment-delete')) return;
        goToSlide(slideNum - 1);
      });
    })(c.slide);

    container.appendChild(div);
  }

  // Delete buttons
  container.querySelectorAll('.comment-delete').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      deleteComment(parseInt(this.dataset.idx));
    });
  });
}

// ===== Header actions =====
function openInNewTab() {
  window.open(DECK_PATH, '_blank');
}

function toggleFullscreen() {
  var el = document.querySelector('.preview-wrapper');
  if (!document.fullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
}

function toggleSidebar() {
  var sidebar = document.getElementById('sidebar');
  var btn = document.getElementById('commentToggle');
  sidebar.classList.toggle('hidden');
  btn.classList.toggle('active');
}

// ===== Export =====
function buildJSON() {
  var reviews = [];
  for (var i = 0; i < commentsList.length; i++) {
    reviews.push({
      slide: commentsList[i].slide,
      comment: commentsList[i].text
    });
  }
  return {
    deck: DECK_PATH,
    timestamp: new Date().toISOString(),
    total_slides: totalSlides,
    reviews: reviews
  };
}

function copyJSON() {
  var data = buildJSON();
  navigator.clipboard.writeText(JSON.stringify(data, null, 2)).then(function() {
    showToast('JSON をクリップボードにコピーしました');
  });
}

// ===== Layout modal =====
function openLayoutModal() {
  document.getElementById('layoutModal').classList.add('active');
  renderPatterns();
}

function closeLayoutModal() {
  document.getElementById('layoutModal').classList.remove('active');
}

function renderPatterns() {
  var container = document.getElementById('patternList');
  container.innerHTML = '';
  var categories = {};
  PATTERNS.forEach(function(p) {
    if (!categories[p.category]) categories[p.category] = [];
    categories[p.category].push(p);
  });
  Object.keys(categories).forEach(function(cat) {
    var h3 = document.createElement('h3');
    h3.textContent = cat;
    container.appendChild(h3);
    var grid = document.createElement('div');
    grid.className = 'pattern-grid';
    categories[cat].forEach(function(p) {
      var btn = document.createElement('button');
      btn.className = 'pattern-btn';
      btn.textContent = p.id + ': ' + p.name;
      btn.onclick = function() {
        insertAction('このスライドを「パターン ' + p.id + ': ' + p.name + '」のレイアウトに変更して');
        closeLayoutModal();
      };
      grid.appendChild(btn);
    });
    container.appendChild(grid);
  });
}

document.getElementById('layoutModal').addEventListener('click', function(e) {
  if (e.target === this) closeLayoutModal();
});

// ===== Utilities =====
function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2000);
}

// ===== Keyboard =====
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') { prevSlide(); e.preventDefault(); }
  if (e.key === 'ArrowRight') { nextSlide(); e.preventDefault(); }
  if (e.key === 'Escape') closeLayoutModal();
});

// ===== Start =====
init();
</script>
</body>
</html>
